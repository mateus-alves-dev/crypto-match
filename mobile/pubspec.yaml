name: crypto_match
description: "A dating/social app for crypto enthusiasts."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0

  # HTTP client
  dio: ^5.7.0

  # Dependency injection
  get_it: ^9.2.1
  injectable: ^2.5.0

  # Immutable models & serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Navigation
  go_router: ^17.1.0

  # Secure storage for JWT
  flutter_secure_storage: ^10.0.0

  # Either / Failure pattern
  dartz: ^0.10.1

  # URL launching (privacy policy, terms of service)
  url_launcher: ^6.3.0

  # Firebase (Firestore for real-time chat)
  firebase_core: ^3.6.0
  cloud_firestore: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.2.5
  injectable_generator: ^2.6.2
  json_serializable: ^6.13.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^6.0.0

  # App icon & splash screen generation
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"

flutter_native_splash:
  color: "#0D0D0D"
  image: assets/images/splash_logo.png
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
